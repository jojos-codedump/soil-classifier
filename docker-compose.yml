version: '3.8'

services:
  soil-classifier:
    build: .
    container_name: soil-inference-app
    # We must pass the camera device to the container for live OpenCV inference
    devices:
      - /dev/video0:/dev/video0
    # X11 Forwarding support for OpenCV UI windows on Linux hosts if needed
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - AM_I_IN_A_DOCKER_CONTAINER=1
      - DISPLAY=$DISPLAY
    # Allows Ctrl+C to stop it gracefully
    tty: true
    stdin_open: true
